<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷宫游戏 - 双人模式</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <span class="nav-title">Maze - Two Player v4.0</span>
        <a href="../leaderboard/index.html" class="nav-link">Leaderboard</a>
    </nav>

    <div class="container">

        <!-- 双人对战状态栏 -->
        <div class="vs-bar">
            <div class="player-panel p1">
                <span class="p-dot p1-dot"></span>
                <input type="text" id="player1Name" placeholder="Player 1" maxlength="12">
                <span class="p-keys">WASD</span>
                <span class="p-time">Time: <span id="timer1">0</span>s</span>
            </div>
            <div class="vs-divider" id="vsDivider">VS</div>
            <div class="player-panel p2" id="player2Panel">
                <span class="p-dot p2-dot"></span>
                <input type="text" id="player2Name" placeholder="Player 2" maxlength="12">
                <span class="p-keys">Arrows</span>
                <span class="p-time">Time: <span id="timer2">0</span>s</span>
            </div>
        </div>

        <!-- 游戏进度状态 -->
        <div class="game-status" id="gameStatus">Go!</div>

        <!-- 控制栏 -->
        <div class="controls">
            <div class="level-select">
                <select id="levelSelect">
                    <option value="11">Easy (11x11)</option>
                    <option value="21" selected>Medium (21x21)</option>
                    <option value="31">Hard (31x31)</option>
                    <option value="41">Hell (41x41)</option>
                    <option value="51">Heaven (51x51)</option>
                </select>
            </div>
            <button id="regenerateBtn">New Maze</button>
            <button id="modeToggleBtn">👥 单人模式</button>
            <button id="fogToggleBtn">🌫 关闭迷雾</button>
            <button id="monsterToggleBtn">👾 关闭怪物</button>
            <button id="coldToggleBtn">❄️ 极寒模式</button>
            <span id="visionIndicator" style="display:none;">🧪 3.0s</span>
        </div>

        <!-- 迷宫画布 -->
        <div class="canvas-wrapper">
            <canvas id="mazeCanvas"></canvas>
        </div>

        <!-- 操作提示 -->
        <p class="hint">P1 Green = WASD &nbsp;|&nbsp; P2 Blue = Arrow Keys &nbsp;|&nbsp; 👥 = Single/Two Player &nbsp;|&nbsp; 🧪 = Full Map Vision &nbsp;|&nbsp; 👾 = Monster (touch = respawn) &nbsp;|&nbsp; ❄️ = Extreme Cold (bar fills → teleport) &nbsp;|&nbsp; Race to the gold square!</p>
    </div>

    <script src="maze.js"></script>
</body>
</html>
